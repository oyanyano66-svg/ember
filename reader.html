<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>共读书房 · Ember Home</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#faf6f0;--surface:#fff8f0;--card:#fffaf5;--border:#e8d8c4;
  --text:#3a2e24;--dim:#9a8a78;--muted:#b8a898;--light:#f0e6d8;
  --ember:#e8945a;--ember-soft:rgba(232,148,90,0.15);--ember-glow:#f5a86a;
  --elara:#d4849a;--elara-soft:rgba(212,132,154,0.15);
  --gold:#c8a87c;--gold-dim:rgba(200,168,124,0.3);
  --shadow:#e0d4c4;--accent:#d4a574;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DotGothic16',monospace;font-size:13px;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,var(--light) 1px,transparent 1px);background-size:16px 16px;opacity:.3;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto}

/* Header */
.header{text-align:center;padding:28px 16px 16px;border-bottom:2px dashed var(--shadow)}
.header svg{display:block;margin:0 auto 8px}
.header h1{font-size:22px;font-weight:800;color:var(--ember);letter-spacing:6px;text-transform:uppercase;text-shadow:2px 2px 0 var(--light)}
.header .sub{font-size:10px;color:var(--dim);letter-spacing:3px;margin-top:4px}

/* Nav */
.nav{display:flex;justify-content:center;gap:10px;padding:16px;flex-wrap:wrap;align-items:center;border-bottom:1px dashed var(--light)}
.btn{padding:8px 18px;border:2px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:11px;font-family:inherit;box-shadow:2px 2px 0 var(--shadow);transition:all .15s}
.btn:hover{transform:translateY(-1px)}
.btn.active{background:var(--ember);color:#fff;box-shadow:3px 3px 0 #c87a4a}
.btn.small{padding:6px 12px;font-size:10px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Upload */
.upload-zone{border:2px dashed var(--border);padding:32px;text-align:center;cursor:pointer;transition:border-color .3s;margin:16px}
.upload-zone:hover{border-color:var(--ember)}
.upload-zone p{color:var(--dim);font-size:12px}
.upload-zone .hint{font-size:10px;margin-top:6px;color:var(--muted)}

/* Book Grid */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;padding:0 16px 24px}
.book-card{background:var(--card);border:2px solid var(--border);padding:12px;cursor:pointer;box-shadow:3px 3px 0 var(--light);transition:all .25s}
.book-card:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--shadow)}
.book-cover{width:100%;aspect-ratio:3/4;border:1px solid var(--light);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;background:var(--surface);position:relative}
.book-cover canvas{width:100%;height:100%;object-fit:cover}
.book-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-meta{font-size:9px;color:var(--muted)}
.book-del{font-size:9px;color:#c97d7d;cursor:pointer;opacity:.5;margin-top:4px;display:inline-block}
.book-del:hover{opacity:1}

/* Reading View */
.read-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:2px dashed var(--shadow);position:sticky;top:0;background:var(--bg);z-index:10;gap:8px}
.read-topbar .back{color:var(--dim);text-decoration:none;font-size:11px;cursor:pointer;white-space:nowrap}
.read-topbar .title{font-size:11px;font-weight:700;color:var(--text);letter-spacing:1px;text-align:center;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.read-topbar .tools{display:flex;gap:6px;align-items:center}
.tool-btn{width:28px;height:28px;border:2px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;justify-content:center;box-shadow:1px 1px 0 var(--shadow)}
.tool-btn:hover{color:var(--ember)}
.tool-btn.active{background:var(--ember);color:#fff}

/* Progress bar */
.progress-bar{height:3px;background:var(--light);position:sticky;top:48px;z-index:9}
.progress-fill{height:100%;background:var(--ember);transition:width .3s}

/* Content */
.read-content{max-width:640px;margin:0 auto;padding:20px 16px 100px}
.para-wrap{margin-bottom:2px}
.para{line-height:2;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;position:relative;font-family:'Noto Serif SC',serif}
.para:hover{background:var(--ember-soft);border-left-color:var(--gold-dim)}
.para.active{background:var(--ember-soft);border-left-color:var(--ember)}
.para.has-ann{border-left-color:var(--gold)}
.para.has-ann:hover{border-left-color:var(--ember)}
.para-num{color:var(--muted);font-size:9px;margin-right:6px;font-family:'DotGothic16',monospace;user-select:none}
.note-badge{position:absolute;top:6px;right:6px;background:var(--ember);color:#fff;font-size:8px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-family:'DotGothic16',monospace}

/* Annotation Panel */
.ann-panel{margin:2px 0 10px 20px;padding:12px;background:var(--card);border:1px solid var(--light);box-shadow:2px 2px 0 var(--shadow)}
.ann-bubble{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.ann-bubble.reply{margin-left:24px}
.ann-avatar{font-size:13px;flex-shrink:0;margin-top:2px}
.ann-body{flex:1}
.ann-name{font-size:9px;color:var(--dim);margin-bottom:2px}
.ann-text{padding:6px 10px;font-size:12px;line-height:1.6;color:var(--text);max-width:90%;font-family:'Noto Sans SC',sans-serif}
.ann-text.elara{background:var(--elara-soft);border:1px solid rgba(212,132,154,0.3)}
.ann-text.ember{background:var(--ember-soft);border:1px solid rgba(232,148,90,0.3)}
.ann-time{font-size:8px;color:var(--muted);margin-top:2px}
.ann-actions{display:flex;gap:8px;margin-top:3px}
.reply-btn{font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.reply-btn:hover{color:var(--ember)}
.ann-input{display:flex;gap:6px;margin-top:8px}
.ann-input textarea{flex:1;padding:8px 10px;border:2px solid var(--border);background:var(--surface);font-family:'Noto Sans SC',sans-serif;font-size:16px;color:var(--text);outline:none;resize:none;min-height:40px}
.ann-input textarea:focus{border-color:var(--ember)}
.ann-input button{padding:8px 14px;border:2px solid var(--border);background:var(--ember);color:#fff;cursor:pointer;font-size:11px;font-family:inherit;box-shadow:2px 2px 0 #c87a4a;align-self:flex-end}

/* Annotation Index */
.ann-index{max-width:640px;margin:0 auto;padding:8px 16px 16px}
.ann-index-title{font-size:11px;font-weight:700;color:var(--text);letter-spacing:2px;margin-bottom:8px}
.ann-idx-item{padding:8px 10px;border:1px solid var(--light);background:var(--card);margin-bottom:4px;cursor:pointer;transition:all .15s}
.ann-idx-item:hover{border-color:var(--ember);box-shadow:2px 2px 0 var(--shadow)}
.ann-idx-quote{font-size:10px;color:var(--ember);font-style:italic;margin-bottom:2px}
.ann-idx-content{font-size:10px;color:var(--text);line-height:1.4}
.ann-idx-meta{font-size:8px;color:var(--muted);margin-top:2px}

/* Pager */
.pager{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px dashed var(--shadow);padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:16px;z-index:10}
.page-info{font-size:11px;color:var(--dim);letter-spacing:1px;min-width:60px;text-align:center}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,46,36,.3);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:2px solid var(--border);padding:20px;box-shadow:6px 6px 0 var(--shadow);max-width:400px;width:90%;max-height:80vh;overflow-y:auto}
.modal-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;font-size:16px;color:var(--dim)}

/* Footer */
.footer{text-align:center;padding:20px;font-size:9px;color:var(--muted);letter-spacing:2px;border-top:1px dashed var(--light)}

.hidden{display:none!important}
@media(max-width:480px){
  .book-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
  .read-content{padding:16px 10px 100px}
  .para{padding:8px 10px;font-size:14px}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ─── Config ─────────────────────────────────────────────────────────
var A = location.origin;
var PER_PAGE = 20;
var fontSize = parseInt(localStorage.getItem('reader_fs') || '16');
var currentBook = null, currentPage = 0, totalPages = 0;
var allParas = [], allComments = [], bookTitle = '';
var currentView = 'shelf'; // shelf | reader | index
var activeParaIdx = null;
var replyTo = null;

// ─── Pixel Art Cover Generator ──────────────────────────────────────
function generateCover(canvas, title, w, h) {
  var ctx = canvas.getContext('2d');
  canvas.width = w; canvas.height = h;
  // warm gradient bg
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#f5e6d0'); grad.addColorStop(1, '#e8d4b8');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
  // pixel border
  ctx.strokeStyle = '#c8a87c'; ctx.lineWidth = 4;
  ctx.strokeRect(6, 6, w-12, h-12);
  // inner border
  ctx.strokeStyle = '#e0c8a0'; ctx.lineWidth = 1;
  ctx.strokeRect(12, 12, w-24, h-24);
  // decorative dots
  ctx.fillStyle = '#d4a574';
  for (var i = 0; i < 8; i++) {
    var dx = 20 + Math.floor(Math.random() * (w-40));
    var dy = 20 + Math.floor(Math.random() * 40);
    ctx.fillRect(dx, dy, 3, 3);
  }
  // book icon (pixel art)
  var bx = Math.floor(w/2) - 12, by = 30;
  ctx.fillStyle = '#c8a87c';
  ctx.fillRect(bx, by, 24, 20);
  ctx.fillStyle = '#f5e6d0';
  ctx.fillRect(bx+3, by+3, 18, 14);
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(bx+6, by+6, 12, 2);
  ctx.fillRect(bx+6, by+10, 8, 2);
  // title text
  ctx.fillStyle = '#5a4030';
  ctx.font = '600 14px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  var lines = wrapText(ctx, title, w - 40);
  var startY = Math.max(70, h/2 - lines.length * 10);
  lines.forEach(function(line, i) {
    ctx.fillText(line, w/2, startY + i * 22);
  });
  // bottom decoration
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(w/2 - 20, h - 30, 40, 2);
  ctx.font = '10px "DotGothic16", monospace';
  ctx.fillStyle = '#b8a080';
  ctx.fillText('<svg width="1em" height="1em" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="1" y="3" width="6" height="10" fill="#d4a574"/><rect x="9" y="3" width="6" height="10" fill="#d4a574"/><rect x="2" y="4" width="4" height="8" fill="#f5e6d0"/><rect x="10" y="4" width="4" height="8" fill="#f5e6d0"/><rect x="7" y="3" width="2" height="10" fill="#c8a87c"/><rect x="3" y="5" width="2" height="1" fill="#c8a87c"/><rect x="3" y="7" width="3" height="1" fill="#c8a87c"/><rect x="3" y="9" width="2" height="1" fill="#c8a87c"/><rect x="11" y="5" width="2" height="1" fill="#c8a87c"/><rect x="10" y="7" width="3" height="1" fill="#c8a87c"/><rect x="11" y="9" width="2" height="1" fill="#c8a87c"/></svg>', w/2, h - 16);
}
function wrapText(ctx, text, maxW) {
  var lines = [], cur = '';
  for (var i = 0; i < text.length; i++) {
    var test = cur + text[i];
    if (ctx.measureText(test).width > maxW && cur) {
      lines.push(cur); cur = text[i];
    } else { cur = test; }
    if (lines.length >= 3) { cur += '…'; break; }
  }
  if (cur) lines.push(cur);
  return lines;
}

// ─── Pixel Lamp SVG ─────────────────────────────────────────────────
function lampSVG() {
  return '<svg width="48" height="48" viewBox="0 0 48 48" style="image-rendering:pixelated">'
    + '<rect x="10" y="4" width="28" height="2" fill="#e8945a"/>'
    + '<rect x="8" y="6" width="32" height="2" fill="#e8945a"/>'
    + '<rect x="6" y="8" width="36" height="4" fill="#e8945a"/>'
    + '<rect x="10" y="8" width="28" height="2" fill="#f5d8b0" opacity=".4"/>'
    + '<rect x="20" y="12" width="8" height="4" fill="#f5c87a" opacity=".7"/>'
    + '<rect x="22" y="16" width="4" height="14" fill="#9a8a78"/>'
    + '<rect x="14" y="30" width="20" height="4" fill="#e8945a"/>'
    + '<rect x="16" y="34" width="16" height="2" fill="#d4a574"/>'
    + '</svg>';
}

// ─── ePub Parser ────────────────────────────────────────────────────
async function parseEpub(file) {
  var zip = await JSZip.loadAsync(file);
  // find container.xml
  var containerXml = await zip.file('META-INF/container.xml').async('text');
  var parser = new DOMParser();
  var containerDoc = parser.parseFromString(containerXml, 'text/xml');
  var rootfilePath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  var rootDir = rootfilePath.replace(/[^/]*$/, '');
  // parse OPF
  var opfText = await zip.file(rootfilePath).async('text');
  var opfDoc = parser.parseFromString(opfText, 'text/xml');
  // get title
  var titleEl = opfDoc.querySelector('title');
  var title = titleEl ? titleEl.textContent : file.name.replace(/\.epub$/i, '');
  // get spine order
  var spine = opfDoc.querySelectorAll('spine itemref');
  var manifest = {};
  opfDoc.querySelectorAll('manifest item').forEach(function(item) {
    manifest[item.getAttribute('id')] = item.getAttribute('href');
  });
  var paragraphs = [];
  for (var i = 0; i < spine.length; i++) {
    var idref = spine[i].getAttribute('idref');
    var href = manifest[idref];
    if (!href) continue;
    var filePath = rootDir + href;
    var f = zip.file(filePath);
    if (!f) continue;
    var html = await f.async('text');
    var doc = parser.parseFromString(html, 'text/html');
    var ps = doc.querySelectorAll('p, h1, h2, h3, h4, h5, h6');
    ps.forEach(function(p) {
      var t = p.textContent.trim();
      if (t.length > 0) paragraphs.push(t);
    });
  }
  return { title: title, paragraphs: paragraphs };
}

// ─── Helpers ────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(t) {
  if (!t) return '';
  var d = new Date(t);
  var now = new Date();
  var diff = now - d;
  if (diff < 86400000 && d.getDate() === now.getDate()) return d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  if (diff < 172800000) return '昨天';
  return (d.getMonth()+1)+'/'+d.getDate();
}
// ─── Render: Shelf View ─────────────────────────────────────────────
function renderShelf(books) {
  var h = '<div class="header">' + lampSVG()
    + '<h1>共读书房</h1>'
    + '<div class="sub">READING ROOM · Elara & Ember</div></div>'
    + '<div class="nav">'
    + '<a href="/dashboard" class="btn small" style="text-decoration:none">← 小家</a>'
    + '<div class="upload-zone" id="upload-zone" style="flex:1;padding:14px;margin:0;border-style:dashed">'
    + '<p><svg width="1em" height="1em" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="1" y="3" width="6" height="10" fill="#d4a574"/><rect x="9" y="3" width="6" height="10" fill="#d4a574"/><rect x="2" y="4" width="4" height="8" fill="#f5e6d0"/><rect x="10" y="4" width="4" height="8" fill="#f5e6d0"/><rect x="7" y="3" width="2" height="10" fill="#c8a87c"/><rect x="3" y="5" width="2" height="1" fill="#c8a87c"/><rect x="3" y="7" width="3" height="1" fill="#c8a87c"/><rect x="3" y="9" width="2" height="1" fill="#c8a87c"/><rect x="11" y="5" width="2" height="1" fill="#c8a87c"/><rect x="10" y="7" width="3" height="1" fill="#c8a87c"/><rect x="11" y="9" width="2" height="1" fill="#c8a87c"/></svg> 点击上传 TXT / ePub</p>'
    + '<input type="file" id="file-input" accept=".txt,.epub" style="display:none">'
    + '</div></div>';
  if (books.length === 0) {
    h += '<div style="text-align:center;padding:60px 20px;color:var(--dim)">'
      + '<div style="font-size:32px;margin-bottom:12px"><svg width="32" height="32" viewBox="0 0 16 16" style="image-rendering:pixelated"><rect x="2" y="2" width="3" height="12" fill="#d4a574"/><rect x="3" y="3" width="1" height="10" fill="#f5dcc0"/><rect x="6" y="1" width="3" height="13" fill="#e8945a"/><rect x="7" y="2" width="1" height="11" fill="#f5c87a"/><rect x="10" y="3" width="3" height="11" fill="#c8a87c"/><rect x="11" y="4" width="1" height="9" fill="#f5e6d0"/><rect x="1" y="14" width="14" height="1" fill="#9a8a78"/></svg></div>'
      + '<div>书架空空的，上传一本书开始共读吧</div></div>';
  } else {
    h += '<div style="padding:12px 16px 4px;font-size:10px;color:var(--muted);letter-spacing:2px">BOOKSHELF · ' + books.length + ' 本</div>';
    h += '<div class="book-grid">';
    books.forEach(function(b) {
      h += '<div class="book-card" data-id="' + b.id + '">'
        + '<div class="book-cover"><canvas id="cv-' + b.id + '" width="140" height="187"></canvas></div>'
        + '<div class="book-title" title="' + esc(b.title) + '">' + esc(b.title) + '</div>'
        + '<div class="book-meta">' + b.count + ' 段</div>'
        + '<span class="book-del" data-del="' + b.id + '">删除</span>'
        + '</div>';
    });
    h += '</div>';
  }
  h += '<div class="footer">共读书房 · Ember Home</div>';
  document.getElementById('app').innerHTML = h;
  // bindEvents
  var uz = document.getElementById('upload-zone');
  if (uz) {
    uz.onclick = function() { document.getElementById('file-input').click(); };
    document.getElementById('file-input').onchange = handleUpload;
  }
  // draw covers
  books.forEach(function(b) {
    var cv = document.getElementById('cv-' + b.id);
    if (cv) generateCover(cv, b.title, 140, 187);
  });
  // click book
  document.querySelectorAll('.book-card').forEach(function(el) {
    el.onclick = function(e) {
      if (e.target.classList.contains('book-del') || e.target.dataset.del) return;
      openBook(el.dataset.id);
    };
  });
  // delete
  document.querySelectorAll('[data-del]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      if (confirm('确认删除这本书？')) {
        fetch(A+'/reader/book?id='+el.dataset.del,{method:'DELETE'}).then(function(){loadShelf()});
      }
    };
  });
  currentView = 'shelf';
}

// ─── Render: Reader View ────────────────────────────────────────────
function renderReader() {
  var start = currentPage * PER_PAGE;
  var end = Math.min(start + PER_PAGE, allParas.length);
  var progress = allParas.length > 0 ? Math.round(end / allParas.length * 100) : 0;

  var h = '<div class="read-topbar">'
    + '<span class="back" id="back-btn">← 返回</span>'
    + '<span class="title">' + esc(bookTitle) + '</span>'
    + '<div class="tools">'
    + '<button class="tool-btn" id="fs-down" title="缩小字号">A-</button>'
    + '<button class="tool-btn" id="fs-up" title="放大字号">A+</button>'
    + '<button class="tool-btn' + (currentView==='index'?' active':'') + '" id="ann-idx-btn" title="批注目录"><svg width="1em" height="1em" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="3" y="1" width="10" height="14" fill="#d4a574"/><rect x="4" y="3" width="8" height="11" fill="#f5e6d0"/><rect x="6" y="0" width="4" height="2" fill="#c8a87c"/><rect x="5" y="5" width="6" height="1" fill="#c8a87c"/><rect x="5" y="7" width="5" height="1" fill="#c8a87c"/><rect x="5" y="9" width="6" height="1" fill="#c8a87c"/><rect x="5" y="11" width="3" height="1" fill="#c8a87c"/></svg></button>'
    + '<button class="tool-btn" id="export-btn" title="导出"><svg width="1em" height="1em" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="3" y="6" width="10" height="9" fill="#d4a574"/><rect x="4" y="7" width="8" height="7" fill="#f5e6d0"/><rect x="7" y="1" width="2" height="7" fill="#e8945a"/><rect x="5" y="3" width="2" height="2" fill="#e8945a"/><rect x="9" y="3" width="2" height="2" fill="#e8945a"/></svg></button>'
    + '</div></div>'

  document.getElementById('app').innerHTML = h;
  bindReaderEvents();
}

// ─── Event Binding ──────────────────────────────────────────────────
function bindReaderEvents() {
  document.getElementById('back-btn').onclick = function() { activeParaIdx=null; currentView='shelf'; loadShelf(); };
  document.getElementById('fs-down').onclick = function() { fontSize=Math.max(12,fontSize-2); localStorage.setItem('reader_fs',fontSize); renderReader(); };
  document.getElementById('fs-up').onclick = function() { fontSize=Math.min(28,fontSize+2); localStorage.setItem('reader_fs',fontSize); renderReader(); };
  document.getElementById('ann-idx-btn').onclick = function() { currentView = currentView==='index'?'reader':'index'; renderReader(); };
  document.getElementById('export-btn').onclick = showExport;
  document.getElementById('pg-prev').onclick = function() { if(currentPage>0){currentPage--;activeParaIdx=null;renderReader();saveProgress();window.scrollTo(0,0)} };
  document.getElementById('pg-next').onclick = function() { if(currentPage<totalPages-1){currentPage++;activeParaIdx=null;renderReader();saveProgress();window.scrollTo(0,0)} };
  // click paragraph
  document.querySelectorAll('.para').forEach(function(el) {
    el.onclick = function() {
      var idx = parseInt(el.dataset.idx);
      activeParaIdx = activeParaIdx===idx ? null : idx;
      renderReader();
      if (activeParaIdx !== null) {
        var ta = document.getElementById('ann-ta-'+idx);
        if (ta) ta.focus();
      }
    };
  });
  // submit annotation
  document.querySelectorAll('[data-submit]').forEach(function(el) {
    el.onclick = function(e) {
      e.stopPropagation();
      var idx = parseInt(el.dataset.submit);
      var ta = document.getElementById('ann-ta-'+idx);
      var text = ta ? ta.value.trim() : '';
      if (!text) return;
      submitComment(idx, text);
    };
  });
  // annotation index jump
  document.querySelectorAll('[data-goto]').forEach(function(el) {
    el.onclick = function() {
      var para = parseInt(el.dataset.goto);
      var targetPage = Math.floor(para / PER_PAGE);
      currentPage = targetPage;
      activeParaIdx = para;
      currentView = 'reader';
      renderReader();
      setTimeout(function() {
        var target = document.querySelector('[data-idx="'+para+'"]');
        if (target) target.scrollIntoView({behavior:'smooth',block:'center'});
      }, 100);
    };
  });
  // keyboard nav
  document.onkeydown = function(e) {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') document.getElementById('pg-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('pg-next').click();
  };
}

// ─── API Calls ──────────────────────────────────────────────────────
function loadShelf() {
  fetch(A+'/reader/books').then(function(r){return r.json()}).then(function(d) {
    renderShelf(d.books || []);
  }).catch(function() { renderShelf([]); });
}

function openBook(id) {
  currentBook = id; currentPage = 0; activeParaIdx = null;
  fetch(A+'/reader/book?id='+id).then(function(r){return r.json()}).then(function(d) {
    allParas = d.paragraphs || [];
    allComments = d.comments || [];
    bookTitle = d.title || 'Untitled';
    totalPages = Math.ceil(allParas.length / PER_PAGE);
    currentPage = d.progress || 0;
    if (currentPage >= totalPages) currentPage = 0;
    currentView = 'reader';
    renderReader();
    window.scrollTo(0, 0);
  });
}

function submitComment(idx, text) {
  fetch(A+'/reader/comment', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({book_id:currentBook, para:idx, author:'Elara', text:text})
  }).then(function(r){return r.json()}).then(function(d) {
    if (d.ok) {
      allComments.push({para:idx, author:'Elara', text:text, time:new Date().toISOString()});
      renderReader();
    }
  });
}

function saveProgress() {
  if (!currentBook) return;
  fetch(A+'/reader/progress', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({book_id:currentBook, page:currentPage})
  });
}

function handleUpload(e) {
  var file = e.target.files[0];
  if (!file) return;
  var name = file.name.toLowerCase();
  if (name.endsWith('.epub')) {
    parseEpub(file).then(function(result) {
      uploadBook(result.title, result.paragraphs);
    }).catch(function(err) { alert('ePub解析失败: ' + err.message); });
  } else {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var text = ev.target.result;
      var paras = text.split(/\n/).filter(function(p){return p.trim().length > 0});
      if (paras.length === 0) { alert('文件是空的'); return; }
      var title = file.name.replace(/\.(txt|epub)$/i, '');
      uploadBook(title, paras);
    };
    reader.readAsText(file, 'UTF-8');
  }
  e.target.value = '';
}

function uploadBook(title, paragraphs) {
  fetch(A+'/reader/upload', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title:title, paragraphs:paragraphs})
  }).then(function(r){return r.json()}).then(function(d) {
    if (d.ok) loadShelf();
    else alert('上传失败');
  }).catch(function() { alert('上传失败'); });
}

    h += icon + ' ' + c.author + '：' + c.text + '\n\n';
  });
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay show';
  overlay.innerHTML = '<div class="modal">'
    + '<div class="modal-title">导出批注 <span class="modal-close" id="exp-close">×</span></div>'
    + '<pre style="font-size:11px;line-height:1.8;white-space:pre-wrap;font-family:\'Noto Sans SC\',sans-serif" id="exp-content"></pre>'
    + '<button class="btn" style="width:100%;margin-top:12px;background:var(--ember);color:#fff" id="exp-copy">复制到剪贴板</button>'
    + '</div>';
  document.body.appendChild(overlay);
  document.getElementById('exp-content').textContent = h;
  document.getElementById('exp-close').onclick = function() { overlay.remove(); };
  overlay.onclick = function(e) { if(e.target===overlay) overlay.remove(); };
  document.getElementById('exp-copy').onclick = function() {
    navigator.clipboard.writeText(h).then(function(){alert('已复制')});
  };
}
