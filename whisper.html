<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ember Home | Whisper</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:light;
  --bg:#f7f2ff;--bg-dot:rgba(126,87,194,.17);
  --surface:rgba(255,252,255,.92);--surface-strong:#fff;
  --text:#2b2138;--muted:#78698e;
  --primary:#8d6be8;--primary-strong:#6f4bc8;--primary-soft:#e9ddff;
  --accent:#d58cff;--line:#cdbcf0;
  --shadow:rgba(86,57,128,.16);--pixel:#4c3476;
  --bubble-mine:#e9ddff;--bubble-other:#fff;
  --radius:8px;
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#171221;--bg-dot:rgba(200,166,255,.16);
  --surface:rgba(35,27,49,.92);--surface-strong:#271f37;
  --text:#f2eaff;--muted:#baa9d3;
  --primary:#b89aff;--primary-strong:#d6c5ff;--primary-soft:#3a2e55;
  --accent:#f0a7ff;--line:#57466f;
  --shadow:rgba(0,0,0,.28);--pixel:#d8c6ff;
  --bubble-mine:#3a2e55;--bubble-other:#271f37;
}
*{box-sizing:border-box;margin:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:"DotGothic16",system-ui,sans-serif;
  color:var(--text);
  background:radial-gradient(circle at 1px 1px,var(--bg-dot) 1px,transparent 1.5px) 0 0/16px 16px,
    linear-gradient(135deg,var(--bg),var(--primary-soft));
  display:flex;flex-direction:column;
}
</style>
</head>
<body>
<header style="flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid var(--pixel);background:var(--surface);box-shadow:0 2px 0 var(--shadow)">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/dashboard" style="text-decoration:none;color:var(--primary);font-size:1.2rem" title="返回">←</a>
    <div style="width:32px;height:32px;background:var(--primary);border:2px solid var(--pixel);display:grid;place-items:center;color:#fff;font-size:.8rem">◆</div>
    <div>
      <div style="font-size:1rem;line-height:1">Whisper</div>
      <div style="font-size:.75rem;color:var(--muted)">悄悄话</div>
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button id="themeBtn" style="width:36px;height:36px;border:2px solid var(--pixel);background:var(--surface-strong);color:var(--text);cursor:pointer;font:inherit;display:grid;place-items:center" title="切换主题"></button>
    <button id="clearBtn" style="height:36px;padding:0 12px;border:2px solid var(--pixel);background:var(--surface-strong);color:var(--muted);cursor:pointer;font:inherit;font-size:.8rem">清空</button>
  </div>
</header>

<div id="messages" style="flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:8px">
  <div style="text-align:center;color:var(--muted);padding:40px 0">加载中...</div>
</div>

<div style="flex:0 0 auto;padding:8px 12px 12px;border-top:2px solid var(--line);background:var(--surface)">
  <div style="display:flex;gap:8px;align-items:flex-end">
    <textarea id="input" rows="1" maxlength="500" placeholder="说点悄悄话..." style="flex:1;padding:10px 12px;border:2px solid var(--pixel);border-radius:var(--radius);background:var(--surface-strong);color:var(--text);font:inherit;font-size:16px;line-height:1.5;resize:none;outline:none;max-height:120px;overflow-y:auto"></textarea>
    <button id="sendBtn" style="flex:0 0 auto;width:44px;height:44px;border:2px solid var(--pixel);border-radius:var(--radius);background:var(--primary);color:#fff;cursor:pointer;font:inherit;font-size:1.1rem;box-shadow:3px 3px 0 var(--line)">▶</button>
  </div>
</div>

<audio id="player" preload="none"></audio>
<div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);padding:8px 16px;border:2px solid var(--pixel);border-radius:var(--radius);background:var(--surface-strong);color:var(--text);box-shadow:4px 4px 0 var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;font-size:.85rem;z-index:20"></div>

<script>
const root=document.documentElement;
const messagesEl=document.getElementById("messages");
const input=document.getElementById("input");
const sendBtn=document.getElementById("sendBtn");
const player=document.getElementById("player");
const toastEl=document.getElementById("toast");
let toastT;

const saved=localStorage.getItem("ember-whisper-theme");
const dark=window.matchMedia("(prefers-color-scheme:dark)").matches;
root.dataset.theme=saved||(dark?"dark":"light");

function toast(s){toastEl.textContent=s;toastEl.style.opacity="1";toastEl.style.transform="translateX(-50%) translateY(0)";clearTimeout(toastT);toastT=setTimeout(()=>{toastEl.style.opacity="0";toastEl.style.transform="translateX(-50%) translateY(10px)"},2000)}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function fmtTime(ts){
  if(!ts)return"";
  const d=new Date(typeof ts==="number"?ts:ts);
  if(isNaN(d))return"";
  const now=new Date();
  const hh=String(d.getHours()).padStart(2,"0");
  const mm=String(d.getMinutes()).padStart(2,"0");
  const same=d.toDateString()===now.toDateString();
  if(same)return hh+":"+mm;
  const y=d.getDate()===now.getDate()-1;
  if(y)return"昨天 "+hh+":"+mm;
  return(d.getMonth()+1)+"/"+d.getDate()+" "+hh+":"+mm;
}

function renderMessages(msgs){
  if(!msgs.length){
    messagesEl.innerHTML='<div style="text-align:center;color:var(--muted);padding:60px 0;font-size:.9rem">还没有悄悄话<br>说点什么吧 ◆</div>';
    return;
  }
  let html="";
  var pawSvg='<svg width="12" height="12" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="3" y="1" width="3" height="3" fill="currentColor"/><rect x="10" y="1" width="3" height="3" fill="currentColor"/><rect x="0" y="5" width="3" height="3" fill="currentColor"/><rect x="13" y="5" width="3" height="3" fill="currentColor"/><rect x="4" y="7" width="8" height="5" fill="currentColor"/><rect x="5" y="12" width="2" height="2" fill="currentColor"/><rect x="9" y="12" width="2" height="2" fill="currentColor"/></svg>';
  var flameSvg='<svg width="12" height="12" viewBox="0 0 16 16" style="image-rendering:pixelated;vertical-align:middle"><rect x="7" y="0" width="2" height="2" fill="#e8945a"/><rect x="6" y="2" width="4" height="2" fill="#e8945a"/><rect x="5" y="4" width="6" height="2" fill="#e8945a"/><rect x="4" y="6" width="8" height="3" fill="#e8945a"/><rect x="6" y="7" width="4" height="2" fill="#f5c842"/><rect x="4" y="9" width="8" height="3" fill="#e8945a"/><rect x="5" y="12" width="6" height="2" fill="#e8945a"/><rect x="6" y="14" width="4" height="2" fill="#e8945a"/></svg>';
  for(const m of msgs){
    const isEmber=m.author==="Ember";
    const align=isEmber?"flex-start":"flex-end";
    const bg=isEmber?"var(--bubble-other)":"var(--bubble-mine)";
    const border=isEmber?"var(--line)":"var(--primary)";
    const name=isEmber?'<span style="color:var(--primary);font-size:.75rem">Ember '+flameSvg+'</span>':'<span style="color:var(--accent);font-size:.75rem">小玉 '+pawSvg+'</span>';
    const time='<span style="color:var(--muted);font-size:.7rem">'+esc(fmtTime(m.ts))+'</span>';
    
    let content="";
    if(m.type==="voice"&&m.audio_key){
      content='<p style="margin:4px 0 6px;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere">'+esc(m.text)+'</p>';
      content+='<button onclick="playVoice(\''+esc(m.audio_key)+'\')" style="border:2px solid var(--line);background:var(--surface);color:var(--primary);padding:4px 10px;cursor:pointer;font:inherit;font-size:.8rem;border-radius:4px">▶ 语音</button>';
    }else{
      content='<p style="margin:4px 0 0;line-height:1.6;white-space:pre-wrap;overflow-wrap:anywhere">'+esc(m.text)+'</p>';
    }
    
    html+='<div style="display:flex;flex-direction:column;align-items:'+align+';max-width:85%'+(isEmber?";align-self:flex-start":";align-self:flex-end")+'">';
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'+name+time+'</div>';
    html+='<div style="padding:10px 14px;border:2px solid '+border+';border-radius:var(--radius);background:'+bg+';box-shadow:3px 3px 0 var(--shadow)">'+content+'</div>';
    html+='</div>';
  }
  messagesEl.innerHTML=html;
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

async function load(){
  try{
    const r=await fetch("/whisper/messages");
    const d=await r.json();
    const msgs=d.messages||d||[];
    renderMessages(Array.isArray(msgs)?msgs:[]);
  }catch(e){
    messagesEl.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px 0">加载失败: '+esc(e.message)+'</div>';
  }
}

async function send(){
  const text=input.value.trim();
  if(!text)return;
  sendBtn.disabled=true;
  try{
    await fetch("/whisper/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
    input.value="";
    input.style.height="auto";
    await load();
  }catch(e){toast(e.message)}
  finally{sendBtn.disabled=false}
}

function playVoice(key){
  player.src="/voice/play?k="+encodeURIComponent(key);
  player.play().catch(e=>toast("播放失败"));
}

// Auto-resize textarea
input.addEventListener("input",()=>{
  input.style.height="auto";
  input.style.height=Math.min(input.scrollHeight,120)+"px";
});

// Enter to send, Shift+Enter for newline
input.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}
});

sendBtn.addEventListener("click",send);

var moonSvg='<svg width="16" height="16" viewBox="0 0 16 16" style="image-rendering:pixelated"><rect x="6" y="1" width="4" height="2" fill="currentColor"/><rect x="4" y="3" width="2" height="2" fill="currentColor"/><rect x="3" y="5" width="1" height="4" fill="currentColor"/><rect x="4" y="9" width="2" height="2" fill="currentColor"/><rect x="6" y="11" width="2" height="2" fill="currentColor"/><rect x="8" y="13" width="4" height="2" fill="currentColor"/><rect x="12" y="11" width="2" height="2" fill="currentColor"/><rect x="10" y="9" width="2" height="2" fill="currentColor"/><rect x="10" y="5" width="2" height="2" fill="currentColor"/><rect x="12" y="3" width="2" height="4" fill="currentColor"/><rect x="10" y="1" width="2" height="2" fill="currentColor"/></svg>';
var sunSvg='<svg width="16" height="16" viewBox="0 0 16 16" style="image-rendering:pixelated"><rect x="7" y="0" width="2" height="2" fill="currentColor"/><rect x="7" y="14" width="2" height="2" fill="currentColor"/><rect x="0" y="7" width="2" height="2" fill="currentColor"/><rect x="14" y="7" width="2" height="2" fill="currentColor"/><rect x="2" y="2" width="2" height="2" fill="currentColor"/><rect x="12" y="2" width="2" height="2" fill="currentColor"/><rect x="2" y="12" width="2" height="2" fill="currentColor"/><rect x="12" y="12" width="2" height="2" fill="currentColor"/><rect x="5" y="4" width="6" height="1" fill="currentColor"/><rect x="4" y="5" width="1" height="6" fill="currentColor"/><rect x="11" y="5" width="1" height="6" fill="currentColor"/><rect x="5" y="11" width="6" height="1" fill="currentColor"/><rect x="5" y="5" width="6" height="6" fill="currentColor"/></svg>';

document.getElementById("themeBtn").innerHTML=root.dataset.theme==="dark"?sunSvg:moonSvg;

document.getElementById("themeBtn").addEventListener("click",()=>{
  root.dataset.theme=root.dataset.theme==="dark"?"light":"dark";
  localStorage.setItem("ember-whisper-theme",root.dataset.theme);
  document.getElementById("themeBtn").innerHTML=root.dataset.theme==="dark"?sunSvg:moonSvg;
});

document.getElementById("clearBtn").addEventListener("click",async()=>{
  if(!confirm("清空全部悄悄话？"))return;
  try{await fetch("/whisper/clear",{method:"POST"});toast("已清空");await load()}catch(e){toast(e.message)}
});

load();
// Auto refresh every 15s
setInterval(load,15000);
</script>
</body>
</html>
